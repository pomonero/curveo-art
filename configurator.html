<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curveo — Kendin Tasarla</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:#FAF7F2;--warm-white:#F5F0E8;--sand:#E8DFD0;--stone:#C4B8A5;
    --charcoal:#2C2C2C;--dark:#1A1A1A;--accent:#8B7355;--accent-light:#A6916F;--soft-gray:#6B6560;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--charcoal);overflow:hidden;-webkit-font-smoothing:antialiased;height:100vh}

  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:14px 36px;background:rgba(250,247,242,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(200,190,175,.3);box-shadow:0 2px 40px rgba(0,0,0,.04)}
  .logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;letter-spacing:6px;text-transform:uppercase;color:var(--dark);text-decoration:none}
  .logo span{font-weight:300;color:var(--accent)}
  .nav-back{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--accent);font-size:12px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;transition:color .3s}
  .nav-back:hover{color:var(--charcoal)}

  .app{display:flex;height:100vh;padding-top:56px}

  .sidebar{width:300px;min-width:300px;background:var(--warm-white);border-right:1px solid var(--sand);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}
  .sidebar::-webkit-scrollbar{width:4px}
  .sidebar::-webkit-scrollbar-thumb{background:var(--sand);border-radius:4px}
  .sb-header{padding:24px 20px 16px;border-bottom:1px solid rgba(200,190,175,.3)}
  .sb-header h2{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:var(--dark);margin-bottom:4px}
  .sb-header p{font-size:12px;color:var(--soft-gray);font-weight:300;line-height:1.5}
  .sb-section{padding:16px 20px;border-bottom:1px solid rgba(200,190,175,.15)}
  .sb-label{font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin-bottom:12px}

  .pieces-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .piece-card{background:var(--cream);border:1.5px solid var(--sand);border-radius:12px;padding:10px 6px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:grab;transition:all .25s;user-select:none}
  .piece-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(139,115,85,.12)}
  .piece-card:active{cursor:grabbing;transform:scale(.96)}
  .piece-card .pp{height:48px;display:flex;align-items:center;justify-content:center}
  .piece-card .pn{font-size:10px;font-weight:500;color:var(--charcoal);text-align:center;line-height:1.2}
  .piece-card .ps{font-size:9px;color:var(--stone);font-weight:400}

  .color-row{display:flex;gap:7px;flex-wrap:wrap}
  .cs{width:32px;height:32px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:all .25s;position:relative}
  .cs:hover{transform:scale(1.15)}
  .cs.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,115,85,.18)}
  .cs.active::after{content:'✓';display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:#fff;font-size:12px;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,.5)}

  .wall-row{display:flex;gap:6px}
  .wb{flex:1;padding:8px 4px;border:1.5px solid var(--sand);border-radius:8px;background:var(--cream);cursor:pointer;text-align:center;font-size:10px;font-weight:500;color:var(--soft-gray);font-family:'DM Sans',sans-serif;transition:all .25s}
  .wb.active{border-color:var(--accent);color:var(--charcoal);background:#fff}

  .sb-summary{margin-top:auto;padding:16px 20px;border-top:1px solid var(--sand);background:var(--warm-white)}
  .pt{font-size:9px;color:var(--soft-gray);letter-spacing:1.5px;text-transform:uppercase;font-weight:500;margin-bottom:2px}
  .pv{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:var(--dark);margin-bottom:4px}
  .psm{font-size:11px;color:var(--soft-gray);margin-bottom:12px;line-height:1.6}
  .ob{display:block;width:100%;padding:13px;border-radius:100px;border:none;background:var(--charcoal);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .3s}
  .ob:hover{background:var(--accent);transform:translateY(-1px);box-shadow:0 8px 24px rgba(139,115,85,.25)}
  .ob:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

  .canvas-area{flex:1;display:flex;flex-direction:column;position:relative}
  .toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(250,247,242,.85);backdrop-filter:blur(10px);border-bottom:1px solid rgba(200,190,175,.2);z-index:10}
  .tl{display:flex;gap:6px}
  .tb{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:1px solid var(--sand);border-radius:100px;background:#fff;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--soft-gray);cursor:pointer;transition:all .25s}
  .tb:hover{border-color:var(--accent);color:var(--charcoal)}
  .tb.d:hover{border-color:#c0392b;color:#c0392b}
  .ti{font-size:11px;color:var(--soft-gray)}
  .ti strong{color:var(--accent);font-weight:600}

  .wall{flex:1;position:relative;overflow:hidden;transition:background .5s}
  .wall.light{background:#F0EBE3}
  .wall.medium{background:#D4C9B8}
  .wall.dark{background:#3D3A36}
  .wall.brick{background:#B8937A;background-image:linear-gradient(to right,rgba(0,0,0,.06) 1px,transparent 1px),linear-gradient(to bottom,rgba(0,0,0,.06) 1px,transparent 1px);background-size:60px 28px}
  .wall .hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;transition:opacity .4s}
  .wall.has .hint{opacity:0}
  .hc{width:56px;height:56px;border-radius:50%;background:rgba(139,115,85,.07);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
  .hint h3{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--stone);margin-bottom:4px}
  .hint p{font-size:12px;color:var(--stone);font-weight:300}
  .wall.dark .hint h3,.wall.dark .hint p{color:rgba(255,255,255,.25)}
  .wall.dark .hc{background:rgba(255,255,255,.05)}

  .placed{position:absolute;cursor:grab;transition:filter .15s;user-select:none}
  .placed:hover{filter:drop-shadow(0 4px 14px rgba(139,115,85,.3))}
  .placed.dragging{cursor:grabbing;filter:drop-shadow(0 8px 24px rgba(139,115,85,.4));z-index:999!important}
  .placed .db{position:absolute;top:-8px;right:-8px;width:20px;height:20px;border-radius:50%;background:#c0392b;color:#fff;border:2px solid #fff;font-size:10px;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2);z-index:10;line-height:1}
  .placed:hover .db{display:flex}

  .ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.8;transform:scale(1.05);filter:drop-shadow(0 10px 28px rgba(139,115,85,.35))}

  @media(max-width:900px){
    .app{flex-direction:column}
    .sidebar{width:100%;min-width:auto;max-height:40vh}
    .canvas-area{min-height:60vh}
    nav{padding:10px 16px}
    .logo{font-size:20px;letter-spacing:4px}
  }
  @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .sb-section{animation:fu .4s ease both}
  .sb-section:nth-child(2){animation-delay:.05s}
  .sb-section:nth-child(3){animation-delay:.1s}
  .sb-section:nth-child(4){animation-delay:.15s}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Curve<span>o</span></a>
  <a href="index.html" class="nav-back">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 2L4 8l6 6"/></svg>
    Siteye Dön
  </a>
</nav>
<div class="app">
  <div class="sidebar">
    <div class="sb-header">
      <h2>Kendin Tasarla</h2>
      <p>Parçaları sürükleyip duvara bırakın.</p>
    </div>
    <div class="sb-section">
      <div class="sb-label">Modüler Parçalar</div>
      <div class="pieces-grid" id="pal"></div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Raf Rengi</div>
      <div class="color-row" id="cr"></div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Duvar Rengi</div>
      <div class="wall-row">
        <div class="wb active" data-w="light">Açık</div>
        <div class="wb" data-w="medium">Bej</div>
        <div class="wb" data-w="dark">Koyu</div>
        <div class="wb" data-w="brick">Tuğla</div>
      </div>
    </div>
    <div class="sb-summary">
      <div class="pt">Tahmini Fiyat</div>
      <div class="pv" id="pv">₺0</div>
      <div class="psm" id="sm">Henüz parça eklenmedi</div>
      <button class="ob" id="ob" disabled onclick="alert('Tasarımınız kaydedildi! En kısa sürede iletişime geçeceğiz.')">Sipariş Ver</button>
    </div>
  </div>
  <div class="canvas-area">
    <div class="toolbar">
      <div class="tl">
        <button class="tb" onclick="undo()"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 6h8M2 6l3-3M2 6l3 3"/></svg>Geri Al</button>
        <button class="tb d" onclick="clearAll()"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h8M4 3V2h4v1M3 3v7h6V3"/></svg>Temizle</button>
      </div>
      <div class="ti"><strong id="cn">0</strong> parça</div>
    </div>
    <div class="wall light" id="wall">
      <div class="hint">
        <div class="hc"><svg width="24" height="24" fill="none" stroke="var(--stone)" stroke-width="1.5"><path d="M12 5v14M5 12h14"/></svg></div>
        <h3>Parçaları Buraya Bırakın</h3>
        <p>Soldan sürükleyin, duvara yerleştirin</p>
      </div>
    </div>
  </div>
</div>
<script>
const S=.55, SNAP_DIST=15; // px snap mesafesi
const D=[
  {id:'straight',n:'Düz Parça',w:225.9,h:100,pr:120,
   // Bağlantı noktaları (mm cinsinden, parça sol-üst köşesine göre): sol-orta, sağ-orta, üst-orta, alt-orta
   cp:[ [0,.5],[1,.5],[.5,0],[.5,1] ],
   svg:(W,H,c)=>`<svg width="${W}" height="${H}" viewBox="0 0 226 100"><rect x="0" y="12" width="226" height="76" rx="3" fill="${c}"/><rect x="0" y="8" width="226" height="8" rx="2" fill="${c}" opacity=".65"/><rect x="0" y="88" width="226" height="6" rx="2" fill="${c}" opacity=".45"/></svg>`},
  {id:'curve-cw',n:'Sağ Kavis',w:218,h:228,pr:200,
   cp:[ [.08,0],[1,.92],[.08,.5],[.5,.92] ],
   svg:(W,H,c)=>`<svg width="${W}" height="${H}" viewBox="0 0 218 228"><path d="M18 0 C18 0 18 210 218 210" stroke="${c}" stroke-width="20" fill="none" stroke-linecap="round"/><path d="M0 0 C0 0 0 228 218 228" stroke="${c}" stroke-width="8" fill="none" opacity=".3" stroke-linecap="round"/></svg>`},
  {id:'curve-ccw',n:'Sol Kavis',w:228,h:218,pr:200,
   cp:[ [0,.08],[.92,1],[.5,.08],[.92,.5] ],
   svg:(W,H,c)=>`<svg width="${W}" height="${H}" viewBox="0 0 228 218"><path d="M0 18 C0 18 210 18 210 218" stroke="${c}" stroke-width="20" fill="none" stroke-linecap="round"/><path d="M0 0 C0 0 228 0 228 218" stroke="${c}" stroke-width="8" fill="none" opacity=".3" stroke-linecap="round"/></svg>`},
  {id:'light-curve',n:'Hafif Kavis',w:225.9,h:100,pr:160,
   cp:[ [0,.78],[1,.78],[.5,0],[.5,1] ],
   svg:(W,H,c)=>`<svg width="${W}" height="${H}" viewBox="0 0 226 100"><path d="M0 78 Q113 2 226 78" stroke="${c}" stroke-width="18" fill="none" stroke-linecap="round"/><path d="M0 88 Q113 14 226 88" stroke="${c}" stroke-width="6" fill="none" opacity=".35" stroke-linecap="round"/></svg>`},
  {id:'corner1',n:'Köşe Parça L',w:110,h:135.9,pr:150,
   cp:[ [.11,0],[1,.91],[0,.5],[.5,.91] ],
   svg:(W,H,c)=>`<svg width="${W}" height="${H}" viewBox="0 0 110 136"><path d="M12 0 L12 124 L110 124" stroke="${c}" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M0 0 L0 136 L110 136" stroke="${c}" stroke-width="6" fill="none" opacity=".3" stroke-linecap="round" stroke-linejoin="round"/></svg>`},
  {id:'corner2',n:'Köşe Parça R',w:110,h:135.9,pr:150,
   cp:[ [.89,0],[0,.91],[1,.5],[.5,.91] ],
   svg:(W,H,c)=>`<svg width="${W}" height="${H}" viewBox="0 0 110 136"><path d="M98 0 L98 124 L0 124" stroke="${c}" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M110 0 L110 136 L0 136" stroke="${c}" stroke-width="6" fill="none" opacity=".3" stroke-linecap="round" stroke-linejoin="round"/></svg>`},
  {id:'t-piece',n:'T Parça',w:225.9,h:100,pr:180,
   cp:[ [0,.16],[1,.16],[.5,0],[.5,1] ],
   svg:(W,H,c)=>`<svg width="${W}" height="${H}" viewBox="0 0 226 100"><line x1="0" y1="16" x2="226" y2="16" stroke="${c}" stroke-width="18" stroke-linecap="round"/><line x1="113" y1="16" x2="113" y2="100" stroke="${c}" stroke-width="18" stroke-linecap="round"/><line x1="0" y1="6" x2="226" y2="6" stroke="${c}" stroke-width="6" opacity=".35" stroke-linecap="round"/></svg>`},
  {id:'cross',n:'Çapraz Bağlantı',w:225.9,h:111.8,pr:220,
   cp:[ [0,.5],[1,.5],[.5,0],[.5,1] ],
   svg:(W,H,c)=>`<svg width="${W}" height="${H}" viewBox="0 0 226 112"><line x1="0" y1="56" x2="226" y2="56" stroke="${c}" stroke-width="18" stroke-linecap="round"/><line x1="113" y1="0" x2="113" y2="112" stroke="${c}" stroke-width="18" stroke-linecap="round"/><circle cx="113" cy="56" r="12" fill="${c}" opacity=".5"/></svg>`},
  {id:'end-block',n:'Başlangıç/Bitiş',w:35.9,h:100,pr:50,
   cp:[ [0,.5],[1,.5],[.5,0],[.5,1] ],
   svg:(W,H,c)=>`<svg width="${W}" height="${H}" viewBox="0 0 36 100"><rect x="3" y="3" width="30" height="94" rx="4" fill="${c}"/><rect x="7" y="7" width="22" height="86" rx="3" fill="${c}" opacity=".7"/><line x1="18" y1="18" x2="18" y2="82" stroke="#fff" stroke-width="1.5" opacity=".12"/></svg>`}
];
const C=[
  {h:'#2C2C2C',n:'Siyah'},
  {h:'#F5F0E8',n:'Krem',b:1},
  {h:'#8B7355',n:'Ceviz'},
  {h:'#C4A882',n:'Meşe'},
  {h:'#FFFFFF',n:'Beyaz',b:1},
  {h:'#5D4E37',n:'Koyu Ceviz'}
];
let P=[],ic=0,ac=C[0].h,gh=null,dd=null;
const wl=document.getElementById('wall');

// Snap indicator element
const snapLine=document.createElement('div');
snapLine.style.cssText='position:absolute;background:#8B7355;border-radius:2px;pointer-events:none;z-index:900;transition:opacity .1s;opacity:0';
wl.appendChild(snapLine);

// === SNAP SYSTEM ===
// Her parçanın bağlantı noktalarını px cinsinden hesapla
function getConnectors(p){
  const pw=Math.round(p.d.w*S), ph=Math.round(p.d.h*S);
  return p.d.cp.map(([rx,ry])=>({
    x: p.x + rx*pw,
    y: p.y + ry*ph
  }));
}

// Sürüklenen parça için en yakın snap noktasını bul
function findSnap(draggedId, newX, newY, def){
  const pw=Math.round(def.w*S), ph=Math.round(def.h*S);
  // Sürüklenen parçanın connectorları (geçici pozisyonda)
  const dragConns=def.cp.map(([rx,ry])=>({
    x: newX + rx*pw,
    y: newY + ry*ph,
    rx, ry
  }));

  let bestDist=SNAP_DIST;
  let bestDx=0, bestDy=0;
  let snapped=false;

  for(const other of P){
    if(other.id===draggedId) continue;
    const otherConns=getConnectors(other);

    for(const dc of dragConns){
      for(const oc of otherConns){
        const dist=Math.hypot(dc.x-oc.x, dc.y-oc.y);
        if(dist<bestDist){
          bestDist=dist;
          bestDx=oc.x-dc.x;
          bestDy=oc.y-dc.y;
          snapped=true;
        }
      }
    }
  }

  // Ayrıca kenar yapışması: kenarlar hizalanınca yapışsın
  for(const other of P){
    if(other.id===draggedId) continue;
    const opw=Math.round(other.d.w*S), oph=Math.round(other.d.h*S);

    // Sol kenar - sağ kenara yapışma
    const dRight=newX+pw, oLeft=other.x;
    if(Math.abs(dRight-oLeft)<SNAP_DIST){
      // Dikey hizalama da kontrol
      const overlapY=Math.max(0,Math.min(newY+ph,other.y+oph)-Math.max(newY,other.y));
      if(overlapY>10){
        const dx=oLeft-(newX+pw);
        const vertDist=Math.abs(dx);
        if(vertDist<bestDist){bestDist=vertDist;bestDx=dx;bestDy=0;snapped=true}
      }
    }
    // Sağ kenar - sol kenara
    const dLeft=newX, oRight=other.x+opw;
    if(Math.abs(dLeft-oRight)<SNAP_DIST){
      const overlapY=Math.max(0,Math.min(newY+ph,other.y+oph)-Math.max(newY,other.y));
      if(overlapY>10){
        const dx=oRight-newX;
        if(Math.abs(dx)<bestDist){bestDist=Math.abs(dx);bestDx=dx;bestDy=0;snapped=true}
      }
    }
    // Üst kenar - alt kenara
    const dBottom=newY+ph, oTop=other.y;
    if(Math.abs(dBottom-oTop)<SNAP_DIST){
      const overlapX=Math.max(0,Math.min(newX+pw,other.x+opw)-Math.max(newX,other.x));
      if(overlapX>10){
        const dy=oTop-(newY+ph);
        if(Math.abs(dy)<bestDist){bestDist=Math.abs(dy);bestDx=0;bestDy=dy;snapped=true}
      }
    }
    // Alt kenar - üst kenara
    const dTop=newY, oBottom=other.y+oph;
    if(Math.abs(dTop-oBottom)<SNAP_DIST){
      const overlapX=Math.max(0,Math.min(newX+pw,other.x+opw)-Math.max(newX,other.x));
      if(overlapX>10){
        const dy=oBottom-newY;
        if(Math.abs(dy)<bestDist){bestDist=Math.abs(dy);bestDx=0;bestDy=dy;snapped=true}
      }
    }

    // Yatay hizalama (üst-üst, alt-alt)
    if(Math.abs(newY-other.y)<SNAP_DIST && Math.abs(newX-(other.x+opw))<SNAP_DIST*2){
      if(Math.abs(newY-other.y)<bestDist){bestDy=other.y-newY;snapped=true;bestDist=Math.abs(bestDy)}
    }
    if(Math.abs((newY+ph)-(other.y+oph))<SNAP_DIST){
      const dy=(other.y+oph)-(newY+ph);
      if(Math.abs(dy)<bestDist){bestDy=dy;snapped=true;bestDist=Math.abs(dy)}
    }
  }

  return snapped?{dx:bestDx,dy:bestDy}:null;
}

function showSnapIndicator(x,y,w,h){
  snapLine.style.left=x+'px';
  snapLine.style.top=y+'px';
  snapLine.style.width=w+'px';
  snapLine.style.height=h+'px';
  snapLine.style.opacity='0.5';
}
function hideSnap(){snapLine.style.opacity='0'}

// === PALETTE ===
const pal=document.getElementById('pal');
D.forEach(d=>{
  const pw=Math.round(d.w*.26),ph=Math.round(d.h*.26);
  const c=document.createElement('div');
  c.className='piece-card';c.draggable=true;
  c.innerHTML=`<div class="pp">${d.svg(pw,ph,'#999')}</div><div class="pn">${d.n}</div><div class="ps">${d.w.toFixed(0)}×${d.h.toFixed(0)}mm</div>`;
  c.addEventListener('dragstart',e=>{
    dd=d;
    gh=document.createElement('div');gh.className='ghost';
    gh.innerHTML=d.svg(Math.round(d.w*S),Math.round(d.h*S),ac);
    document.body.appendChild(gh);
    const img=new Image();img.src='data:image/gif;base64,R0lGODlhAQABAIAAAAUEBAAAACwAAAAAAQABAAACAkQBADs=';
    e.dataTransfer.setDragImage(img,0,0);e.dataTransfer.effectAllowed='copy';
  });
  c.addEventListener('dragend',()=>{if(gh){gh.remove();gh=null}dd=null;hideSnap()});
  pal.appendChild(c);
});

// === COLORS ===
const cr=document.getElementById('cr');
C.forEach((c,i)=>{
  const e=document.createElement('div');
  e.className='cs'+(i===0?' active':'');
  e.style.background=c.h;
  if(c.b)e.style.borderColor='#ddd';
  e.title=c.n;e.dataset.c=c.h;
  e.addEventListener('click',()=>{
    document.querySelectorAll('.cs').forEach(s=>s.classList.remove('active'));
    e.classList.add('active');ac=c.h;
    P.forEach(p=>{p.c=ac;const el=document.getElementById('p-'+p.id);
      if(el){const W=Math.round(p.d.w*S),H=Math.round(p.d.h*S);
        el.innerHTML=p.d.svg(W,H,ac)+`<div class="db" onclick="del(${p.id})">×</div>`}});
  });
  cr.appendChild(e);
});

// === WALL OPTIONS ===
document.querySelectorAll('.wb').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.wb').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');wl.className='wall '+b.dataset.w;
    if(P.length>0)wl.classList.add('has');
  });
});

// === DRAG FROM PALETTE ===
document.addEventListener('drag',e=>{
  if(gh&&e.clientX>0){
    const gw=dd?Math.round(dd.w*S)/2:60,gy=dd?Math.round(dd.h*S)/2:30;
    gh.style.left=(e.clientX-gw)+'px';gh.style.top=(e.clientY-gy)+'px';
  }
});

wl.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='copy'});
wl.addEventListener('drop',e=>{
  e.preventDefault();if(!dd)return;
  const r=wl.getBoundingClientRect(),pw=Math.round(dd.w*S),ph=Math.round(dd.h*S);
  let x=e.clientX-r.left-pw/2, y=e.clientY-r.top-ph/2;

  // Snap on drop
  const snap=findSnap(-1,x,y,dd);
  if(snap){x+=snap.dx;y+=snap.dy}

  place(dd,x,y);
  if(gh){gh.remove();gh=null}dd=null;hideSnap();
});

function place(d,x,y){const id=++ic;const p={id,d,x,y,c:ac};P.push(p);render(p);upd();wl.classList.add('has')}

function render(p){
  const W=Math.round(p.d.w*S),H=Math.round(p.d.h*S);
  const el=document.createElement('div');el.className='placed';el.id='p-'+p.id;
  el.style.left=p.x+'px';el.style.top=p.y+'px';el.style.width=W+'px';el.style.height=H+'px';
  el.innerHTML=p.d.svg(W,H,p.c)+`<div class="db" onclick="del(${p.id})">×</div>`;

  let dr=false,sx,sy,ox,oy;

  const dn=(cx,cy)=>{
    dr=true;el.classList.add('dragging');
    sx=cx;sy=cy;
    ox=parseInt(el.style.left);oy=parseInt(el.style.top);
  };

  const mv=(cx,cy)=>{
    if(!dr)return;
    let newX=ox+cx-sx, newY=oy+cy-sy;

    // Snap while dragging
    const snap=findSnap(p.id,newX,newY,p.d);
    if(snap){
      newX+=snap.dx;
      newY+=snap.dy;
      // Show snap indicator
      showSnapIndicator(newX,newY,W,3);
    } else {
      hideSnap();
    }

    el.style.left=newX+'px';
    el.style.top=newY+'px';
  };

  const up=()=>{
    if(!dr)return;
    dr=false;el.classList.remove('dragging');
    hideSnap();
    const pp=P.find(pp=>pp.id===p.id);
    if(pp){
      pp.x=parseInt(el.style.left);
      pp.y=parseInt(el.style.top);
    }
  };

  el.addEventListener('mousedown',e=>{if(e.target.classList.contains('db'))return;dn(e.clientX,e.clientY);e.preventDefault()});
  document.addEventListener('mousemove',e=>mv(e.clientX,e.clientY));
  document.addEventListener('mouseup',up);
  el.addEventListener('touchstart',e=>{if(e.target.classList.contains('db'))return;const t=e.touches[0];dn(t.clientX,t.clientY);e.preventDefault()},{passive:false});
  document.addEventListener('touchmove',e=>{if(!dr)return;const t=e.touches[0];mv(t.clientX,t.clientY)});
  document.addEventListener('touchend',up);
  wl.appendChild(el);
}

function del(id){const el=document.getElementById('p-'+id);if(el)el.remove();P=P.filter(p=>p.id!==id);upd();if(!P.length)wl.classList.remove('has')}
function undo(){if(!P.length)return;del(P[P.length-1].id)}
function clearAll(){if(!P.length)return;[...P].forEach(p=>{const el=document.getElementById('p-'+p.id);if(el)el.remove()});P=[];upd();wl.classList.remove('has')}

function upd(){
  const t=P.reduce((s,p)=>s+p.d.pr,0);
  document.getElementById('pv').textContent='₺'+t.toLocaleString('tr-TR');
  document.getElementById('cn').textContent=P.length;
  document.getElementById('ob').disabled=!P.length;
  const c={};P.forEach(p=>{c[p.d.n]=(c[p.d.n]||0)+1});
  document.getElementById('sm').textContent=P.length?Object.entries(c).map(([n,v])=>`${v}× ${n}`).join(' · '):'Henüz parça eklenmedi';
}
</script>
