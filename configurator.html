<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curveo — Kendin Tasarla</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--cream:#FAF7F2;--warm-white:#F5F0E8;--sand:#E8DFD0;--stone:#C4B8A5;--charcoal:#2C2C2C;--dark:#1A1A1A;--accent:#8B7355;--accent-light:#A6916F;--soft-gray:#6B6560}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--charcoal);overflow:hidden;-webkit-font-smoothing:antialiased;height:100vh}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:14px 36px;background:rgba(250,247,242,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(200,190,175,.3);box-shadow:0 2px 40px rgba(0,0,0,.04)}
.logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;letter-spacing:6px;text-transform:uppercase;color:var(--dark);text-decoration:none}
.logo span{font-weight:300;color:var(--accent)}
.nav-back{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--accent);font-size:12px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase}
.app{display:flex;height:100vh;padding-top:56px}
.sidebar{width:300px;min-width:300px;background:var(--warm-white);border-right:1px solid var(--sand);display:flex;flex-direction:column;overflow-y:auto}
.sidebar::-webkit-scrollbar{width:4px}.sidebar::-webkit-scrollbar-thumb{background:var(--sand);border-radius:4px}
.sb-h{padding:24px 20px 16px;border-bottom:1px solid rgba(200,190,175,.3)}
.sb-h h2{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:var(--dark);margin-bottom:4px}
.sb-h p{font-size:12px;color:var(--soft-gray);font-weight:300;line-height:1.5}
.sb-s{padding:16px 20px;border-bottom:1px solid rgba(200,190,175,.15)}
.sb-l{font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.sb-l button{background:none;border:none;color:var(--stone);font-size:8px;cursor:pointer;font-weight:700;font-family:inherit;letter-spacing:1.5px}
.sb-l button:hover{color:#c0392b}
.tabs{display:flex;gap:0;margin-bottom:14px;border:1px solid var(--sand);border-radius:8px;overflow:hidden}
.tab{flex:1;padding:8px;text-align:center;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;background:var(--cream);color:var(--soft-gray);transition:all .2s;border:none;font-family:inherit}
.tab.active{background:var(--charcoal);color:var(--cream)}
.drag-pieces{display:flex;flex-direction:column;gap:6px}
.drag-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--sand);border-radius:12px;background:var(--cream);cursor:grab;transition:all .2s;user-select:none}
.drag-item:hover{border-color:var(--accent);transform:translateX(3px);box-shadow:0 4px 16px rgba(139,115,85,.1)}
.drag-item:active{cursor:grabbing;transform:scale(.97)}
.drag-item .di-icon{width:48px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.drag-item .di-info{flex:1}
.drag-item .di-name{font-size:12px;font-weight:500;color:var(--charcoal)}
.drag-item .di-size{font-size:10px;color:var(--stone);margin-top:1px}
.presets{display:flex;flex-direction:column;gap:6px}
.preset-btn{padding:14px;border-radius:10px;border:1px solid var(--sand);background:var(--cream);cursor:pointer;text-align:left;font-family:inherit;transition:all .15s;position:relative}
.preset-btn:hover{transform:translateX(3px);border-color:var(--accent)}
.preset-btn.pop{border:2px solid var(--accent)}
.preset-btn .pop-tag{position:absolute;top:-8px;right:10px;background:var(--accent);color:white;padding:2px 8px;border-radius:100px;font-size:7px;font-weight:700;letter-spacing:1px}
.preset-btn .pr-name{font-size:13px;font-weight:500}
.preset-btn .pr-info{font-size:10px;color:var(--stone);margin-top:2px}
.pieces-list{display:flex;flex-direction:column;gap:1px;max-height:150px;overflow-y:auto;margin-bottom:10px}
.pl-item{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:6px;font-size:11px;transition:background .15s}
.pl-item:hover{background:rgba(139,115,85,.06)}
.pl-item .pl-idx{color:var(--stone);font-size:9px;margin-right:6px;min-width:14px}
.pl-item .pl-del{background:none;border:none;color:var(--stone);cursor:pointer;font-size:16px;font-family:inherit;line-height:1;padding:0 2px}
.pl-item .pl-del:hover{color:#c0392b}
.color-row{display:flex;gap:7px;flex-wrap:wrap}
.cs{width:32px;height:32px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:all .25s;position:relative}
.cs:hover{transform:scale(1.15)}
.cs.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,115,85,.18)}
.cs.out-of-stock{opacity:.5;cursor:not-allowed}
.cs.out-of-stock:hover{transform:none}
.cs.out-of-stock::after{content:'';position:absolute;top:50%;left:-2px;right:-2px;height:2.5px;background:#c0392b;transform:rotate(-45deg);border-radius:2px}
.cs .cs-tip{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--stone);white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
.cs:hover .cs-tip{opacity:1}
.stock-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;color:var(--stone);font-weight:500;margin-top:1px}
.stock-badge .dot{width:5px;height:5px;border-radius:50%;background:#27ae60}
.stock-badge.low .dot{background:#e67e22}
.stock-badge.out .dot{background:#c0392b}
.stock-badge.out{color:#c0392b}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(26,26,26,.5);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--cream);border-radius:20px;padding:28px;max-width:440px;width:92%;box-shadow:0 40px 80px rgba(0,0,0,.15);transform:translateY(20px);transition:transform .3s}
.modal-overlay.show .modal{transform:translateY(0)}
.modal .sb-l{margin-bottom:8px}
.modal h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;margin-bottom:16px}
.modal .m-summary{background:var(--warm-white);border-radius:12px;padding:14px;margin-bottom:16px}
.modal .m-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--sand);font-size:12px;color:var(--soft-gray)}
.modal .m-row:last-child{border:none}
.modal .m-total{display:flex;justify-content:space-between;padding:10px 0 0;border-top:1px solid var(--sand);font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;margin-top:4px}
.modal .m-form{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.modal .m-input{padding:12px 16px;border:1.5px solid var(--sand);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--warm-white);color:var(--charcoal);outline:none;transition:border-color .2s}
.modal .m-input:focus{border-color:var(--accent)}
.modal .m-input::placeholder{color:var(--stone)}
.modal .m-btns{display:flex;gap:8px}
.modal .m-btn{flex:1;padding:13px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.modal .m-btn.secondary{background:transparent;border:1px solid var(--sand);color:var(--soft-gray)}
.modal .m-btn.secondary:hover{border-color:var(--accent);color:var(--charcoal)}
.modal .m-btn.primary{background:var(--charcoal);border:none;color:var(--cream)}
.modal .m-btn.primary:hover{background:var(--accent)}
.modal .m-btn.primary:disabled{opacity:.35;cursor:not-allowed}
.modal .m-success{text-align:center;padding:20px 0}
.modal .m-success .check{width:56px;height:56px;border-radius:50%;background:#27ae60;color:white;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 14px}
.modal .m-success h4{font-family:'Cormorant Garamond',serif;font-size:20px;margin-bottom:6px}
.modal .m-success p{font-size:12px;color:var(--soft-gray);line-height:1.5}
.sb-sum{margin-top:auto;padding:16px 20px;border-top:1px solid var(--sand);background:var(--warm-white)}
.sum-row{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;color:var(--soft-gray)}
.sum-total{display:flex;justify-content:space-between;padding:8px 0 0;margin-top:8px;border-top:1px solid var(--sand);font-weight:600}
.sum-total .sum-price{font-family:'Cormorant Garamond',serif;font-size:24px}
.ob{display:block;width:100%;padding:13px;border-radius:100px;border:none;background:var(--charcoal);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .3s;margin-top:12px}
.ob:hover{background:var(--accent);transform:translateY(-1px);box-shadow:0 8px 24px rgba(139,115,85,.25)}
.ob:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.undo-btn{width:100%;padding:8px;border-radius:8px;border:1px solid var(--sand);background:transparent;font-size:10px;color:var(--soft-gray);cursor:pointer;font-family:inherit;margin-bottom:10px;transition:all .2s}
.undo-btn:hover{border-color:var(--accent);color:var(--charcoal)}
.canvas-area{flex:1;display:flex;flex-direction:column;min-width:0}
.canvas-main{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;background:linear-gradient(180deg,#FDFCFA,#F5F0E8);overflow:hidden}
.canvas-main .dot-bg{position:absolute;inset:0;opacity:.015;background-image:radial-gradient(circle,#8B7355 .5px,transparent .5px);background-size:22px 22px;pointer-events:none}
.canvas-bar{padding:10px 20px;border-top:1px solid var(--sand);background:var(--warm-white);display:flex;justify-content:space-between;align-items:center}
.canvas-bar .cb-info{font-size:11px;color:var(--soft-gray)}
.canvas-bar .cb-price{font-family:'Cormorant Garamond',serif;font-size:24px}
.empty-hint{display:flex;flex-direction:column;align-items:center;gap:14px;opacity:.4}
.empty-hint p{color:var(--stone);font-size:14px}
.drop-hint-bar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(139,115,85,.9);color:white;padding:7px 20px;border-radius:100px;font-size:11px;font-weight:600;pointer-events:none;white-space:nowrap;z-index:50}
.badge-bar{position:absolute;bottom:14px;left:14px;background:rgba(26,26,26,.72);backdrop-filter:blur(8px);color:white;padding:5px 14px;border-radius:100px;font-size:10px;font-weight:500;display:flex;gap:10px}
.badge-bar .sep{opacity:.35}
.ghost{position:fixed;width:56px;height:56px;border-radius:14px;color:white;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.2);transition:background .15s,transform .15s;flex-direction:column;gap:2px}
@media(max-width:900px){.app{flex-direction:column}.sidebar{width:100%;min-width:auto;max-height:40vh}.canvas-area{min-height:60vh}nav{padding:10px 16px}}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sb-s{animation:fu .4s ease both}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Curve<span>o</span></a>
  <a href="index.html" class="nav-back"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 2L4 8l6 6"/></svg> Siteye Dön</a>
</nav>
<div class="app">
  <div class="sidebar">
    <div class="sb-h"><h2>Kendin Tasarla</h2><p>Parçaları sürükleyip bağlantı noktalarına bırakın.</p></div>
    <div class="sb-s">
      <div class="tabs"><button class="tab active" onclick="setTab('build')">Oluştur</button><button class="tab" onclick="setTab('presets')">Şablonlar</button></div>
      <div id="buildPanel"><div class="sb-l">Parça Sürükle</div><div class="drag-pieces" id="dragPieces"></div></div>
      <div id="presetsPanel" style="display:none"><div class="sb-l">Hazır Şablonlar</div><div class="presets" id="presetsList"></div></div>
    </div>
    <div class="sb-s" id="piecesSection" style="display:none">
      <div class="sb-l"><span>Parçalar (<span id="pCount">0</span>)</span><button onclick="clearAll()">TEMİZLE</button></div>
      <div class="pieces-list" id="piecesList"></div>
      <button class="undo-btn" onclick="undo()">← Geri Al</button>
    </div>
    <div class="sb-s"><div class="sb-l">Renk</div><div class="color-row" id="colorRow"></div></div>
    <div class="sb-sum">
      <div id="sumDetails"></div>
      <div class="sum-total"><span>Toplam</span><span class="sum-price" id="sumPrice">₺0</span></div>
      <button class="ob" id="orderBtn" disabled onclick="openCheckout()">Sipariş Ver</button>
    </div>
  </div>
  <div class="canvas-area">
    <div class="canvas-main" id="canvas">
      <div class="dot-bg"></div>
      <svg id="svg" style="width:100%;height:100%;max-height:560px" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="empty-hint" id="emptyHint">
        <svg width="110" height="65" viewBox="0 0 110 65" fill="none"><path d="M12 5L50 5Q68 5 68 23L68 42Q68 60 50 60L12 60Q5 55 5 42L5 23Q5 8 12 5" stroke="#B0A898" stroke-width="3" fill="none" stroke-dasharray="5 4"/></svg>
        <p>Parçaları sürükleyip buraya bırakın</p>
      </div>
      <div class="badge-bar" id="badge" style="display:none"><span id="badgeP"></span><span class="sep">|</span><span id="badgeC"></span></div>
      <div class="drop-hint-bar" id="dropHint" style="display:none"></div>
    </div>
    <div class="canvas-bar"><div class="cb-info" id="barInfo">Parça sürükleyin</div><div class="cb-price" id="barPrice">₺0</div></div>
  </div>
</div>
<div class="ghost" id="ghost" style="display:none"><span class="g-icon" style="display:flex;align-items:center;justify-content:center;color:white"></span><span class="g-label" style="font-size:7px;font-weight:700;opacity:.7"></span></div>

<!-- ÖDEME MODALI -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div id="modalContent"></div>
  </div>
</div>

<script>
/*  Ağaç yapılı modüler raf konfiguratörü
    Her parça bir node: {id, type, x, y, dir, branches:[]}
    T parçası 1 dal, Cross 2 dal açar.
    Her dal kendi zincirini taşır.
*/
const RX=172,RY=192,HW=10,SL=226,CL=110;
const DX=[1,0,-1,0],DY=[0,1,0,-1];

const PT=[
  {id:'curve_l',name:'Sol Kavis',size:'228×218mm',pr:250,stock:12,
   icon:`<svg width="40" height="32" viewBox="0 0 40 32" fill="none"><path d="M4 4C4 4 4 28 36 28" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" fill="none"/></svg>`},
  {id:'curve_r',name:'Sağ Kavis',size:'218×228mm',pr:250,stock:12,
   icon:`<svg width="40" height="32" viewBox="0 0 40 32" fill="none"><path d="M4 28C4 28 4 4 36 4" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" fill="none"/></svg>`},
  {id:'straight',name:'Düz Parça',size:'226×20mm',pr:200,stock:20,
   icon:`<svg width="40" height="32" viewBox="0 0 40 32" fill="none"><line x1="4" y1="16" x2="36" y2="16" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/></svg>`},
  {id:'corner_l',name:'Köşe Sol',size:'110×136mm',pr:200,stock:8,
   icon:`<svg width="40" height="32" viewBox="0 0 40 32" fill="none"><path d="M12 4L12 24L36 24" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`},
  {id:'corner_r',name:'Köşe Sağ',size:'110×136mm',pr:200,stock:8,
   icon:`<svg width="40" height="32" viewBox="0 0 40 32" fill="none"><path d="M28 4L28 24L4 24" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`},
  {id:'t_piece',name:'T Parça',size:'226×66mm',pr:200,stock:6,
   icon:`<svg width="40" height="32" viewBox="0 0 40 32" fill="none"><line x1="4" y1="10" x2="36" y2="10" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/><line x1="20" y1="10" x2="20" y2="28" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/></svg>`},
  {id:'cross',name:'Çapraz (+)',size:'226×112mm',pr:200,stock:4,
   icon:`<svg width="40" height="32" viewBox="0 0 40 32" fill="none"><line x1="4" y1="16" x2="36" y2="16" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/><line x1="20" y1="4" x2="20" y2="28" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/></svg>`},
  {id:'cap',name:'Kapak',size:'36×100mm',pr:50,stock:30,isCap:true,
   icon:`<svg width="40" height="32" viewBox="0 0 40 32" fill="none"><circle cx="20" cy="16" r="8" stroke="currentColor" stroke-width="2.5" fill="none"/><line x1="12" y1="16" x2="28" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity=".4"/></svg>`}
];

const COL={
  black:{body:'#2C2C2C',lite:'#3D3D3D',dark:'#1A1A1A',edge:'#111',label:'Siyah',inStock:true},
  white:{body:'#E8E4DC',lite:'#F4F1EA',dark:'#D2CCC2',edge:'#C0BAB0',label:'Beyaz',inStock:true},
  walnut:{body:'#8B7355',lite:'#A6916F',dark:'#6B5540',edge:'#5D4E37',label:'Ceviz',inStock:false},
  oak:{body:'#C4A882',lite:'#D4BC9A',dark:'#A8916A',edge:'#8B7A60',label:'Meşe',inStock:false},
  mint:{body:'#9DD4C5',lite:'#BDE8DC',dark:'#7CBDAD',edge:'#5EA898',label:'Mint',inStock:false}
};

const PRESETS=[
  {name:'Tekli U',p:['curve_l','curve_l']},
  {name:'İkili Set',p:['curve_l','curve_l','straight','curve_r','curve_r','straight','curve_l','curve_l'],popular:true},
  {name:'S Dalga',p:['curve_l','curve_l','curve_r','curve_r']},
  {name:'Üçlü Set',p:['curve_l','curve_l','straight','curve_r','curve_r','straight','curve_l','curve_l','straight','curve_r','curve_r']}
];

// === STATE ===
// pieces = flat array, ama her item: {id, type, parentPort?}
// ports = tüm açık bağlantı noktaları [{id, x, y, dir, label}]
let nodes=[];  // [{id,type,x,y,dir,endX,endY,endDir, branchPorts:[{id,x,y,dir}]}]
let nodeId=0;
let color='black',tab='build',dragging=null,dropPort=null;

function getEP(dir,cw){
  if(cw)return[{cox:0,coy:RY,eox:RX,eoy:RY},{cox:-RX,coy:0,eox:-RX,eoy:RY},{cox:0,coy:-RY,eox:-RX,eoy:-RY},{cox:RX,coy:0,eox:RX,eoy:-RY}][dir];
  return[{cox:0,coy:-RY,eox:RX,eoy:-RY},{cox:RX,coy:0,eox:RX,eoy:RY},{cox:0,coy:RY,eox:-RX,eoy:RY},{cox:-RX,coy:0,eox:-RX,eoy:-RY}][dir];
}

function addNode(type, startX, startY, startDir){
  const id=++nodeId;
  let ex,ey,edir=startDir;
  const sx=startX,sy=startY;
  const branchPorts=[];

  if(type==='straight'){
    ex=sx+DX[startDir]*SL; ey=sy+DY[startDir]*SL;
  } else if(type==='t_piece'){
    ex=sx+DX[startDir]*SL; ey=sy+DY[startDir]*SL;
    const pd=(startDir+1)%4; // dik dal yönü
    const mx=(sx+ex)/2,my=(sy+ey)/2;
    const bLen=SL*.45;
    branchPorts.push({id:`${id}_b1`,x:mx+DX[pd]*bLen,y:my+DY[pd]*bLen,dir:pd,taken:false});
  } else if(type==='cross'){
    ex=sx+DX[startDir]*SL; ey=sy+DY[startDir]*SL;
    const pd1=(startDir+1)%4,pd2=(startDir+3)%4;
    const mx=(sx+ex)/2,my=(sy+ey)/2;
    const bLen=SL*.45;
    branchPorts.push({id:`${id}_b1`,x:mx+DX[pd1]*bLen,y:my+DY[pd1]*bLen,dir:pd1,taken:false});
    branchPorts.push({id:`${id}_b2`,x:mx+DX[pd2]*bLen,y:my+DY[pd2]*bLen,dir:pd2,taken:false});
  } else if(type==='corner_l'){
    const nd=(startDir+3)%4;
    const kx=sx+DX[startDir]*CL,ky=sy+DY[startDir]*CL;
    ex=kx+DX[nd]*CL; ey=ky+DY[nd]*CL;
    edir=nd;
  } else if(type==='corner_r'){
    const nd=(startDir+1)%4;
    const kx=sx+DX[startDir]*CL,ky=sy+DY[startDir]*CL;
    ex=kx+DX[nd]*CL; ey=ky+DY[nd]*CL;
    edir=nd;
  } else if(type==='curve_l'){
    const cw=false,ep=getEP(startDir,cw),cx=sx+ep.cox,cy=sy+ep.coy;
    ex=sx+ep.eox; ey=sy+ep.eoy;
    edir=(startDir+3)%4;
  } else if(type==='curve_r'){
    const cw=true,ep=getEP(startDir,cw),cx=sx+ep.cox,cy=sy+ep.coy;
    ex=sx+ep.eox; ey=sy+ep.eoy;
    edir=(startDir+1)%4;
  } else if(type==='cap'){
    ex=sx; ey=sy; // kapak ilerlemiyor
  }

  const node={id,type,sx,sy,dir:startDir,ex,ey,edir,branchPorts};
  nodes.push(node);
  return node;
}

// Tüm açık portları hesapla
function getOpenPorts(){
  const ports=[];
  if(!nodes.length){
    ports.push({id:'origin',x:0,y:0,dir:0,label:'Başla'});
    return ports;
  }
  // Her node'un end noktası, eğer başka node'un start'ı değilse açık
  const startPoints=new Set();
  nodes.forEach(n=>{startPoints.add(`${Math.round(n.sx)},${Math.round(n.sy)}`)});

  nodes.forEach(n=>{
    if(n.type==='cap') return;
    const key=`${Math.round(n.ex)},${Math.round(n.ey)}`;
    if(!startPoints.has(key)){
      ports.push({id:`${n.id}_end`,x:n.ex,y:n.ey,dir:n.edir,label:'Uç'});
    }
    // Branch ports
    n.branchPorts.forEach(bp=>{
      if(!bp.taken) ports.push({...bp,label:'Dal'});
    });
  });

  // İlk node'un start noktası da açık olabilir (başa ekleme)
  const first=nodes[0];
  const firstKey=`${Math.round(first.sx)},${Math.round(first.sy)}`;
  // Başka node bu noktayı end olarak kullanıyor mu?
  const endPoints=new Set();
  nodes.forEach(n=>{endPoints.add(`${Math.round(n.ex)},${Math.round(n.ey)}`)});
  if(!endPoints.has(firstKey)){
    ports.push({id:'start',x:first.sx,y:first.sy,dir:(first.dir+2)%4,label:'Baş'});
  }

  return ports;
}

// === SVG RENDER ===
function eArc(cx,cy,sa,ea,cw,hw,side,N=36){
  let sw=ea-sa;if(cw&&sw<0)sw+=Math.PI*2;if(!cw&&sw>0)sw-=Math.PI*2;
  const pts=[];for(let i=0;i<=N;i++){const a=sa+sw*(i/N),co=Math.cos(a),si=Math.sin(a);
    const nl=Math.sqrt((co/RX)**2+(si/RY)**2),nx=(co/RX)/nl,ny=(si/RY)/nl;
    pts.push([cx+RX*co+nx*side*hw,cy+RY*si+ny*side*hw])}return pts;
}

function renderSVG(){
  const svg=document.getElementById('svg');
  const c=COL[color];
  document.getElementById('emptyHint').style.display=nodes.length?'none':'flex';
  document.getElementById('badge').style.display=nodes.length?'flex':'none';
  if(!nodes.length&&!dragging){svg.innerHTML='';svg.removeAttribute('viewBox');return}

  // Bounding box
  const allPts=[];
  nodes.forEach(n=>{
    allPts.push([n.sx,n.sy],[n.ex,n.ey]);
    if(n.type==='corner_l'||n.type==='corner_r'){
      const kx=n.sx+DX[n.dir]*CL,ky=n.sy+DY[n.dir]*CL;
      allPts.push([kx,ky]);
    }
    if(n.type==='curve_l'||n.type==='curve_r'){
      const cw=n.type==='curve_r',ep=getEP(n.dir,cw);
      const cx=n.sx+ep.cox,cy=n.sy+ep.coy;
      for(let i=0;i<=8;i++){const a=Math.PI*2*i/8;allPts.push([cx+RX*Math.cos(a),cy+RY*Math.sin(a)])}
    }
    n.branchPorts.forEach(bp=>{allPts.push([bp.x,bp.y])});
  });
  const ports=getOpenPorts();
  ports.forEach(p=>allPts.push([p.x,p.y]));

  if(!allPts.length) allPts.push([0,0]);
  let mnX=Infinity,mxX=-Infinity,mnY=Infinity,mxY=-Infinity;
  allPts.forEach(([x,y])=>{mnX=Math.min(mnX,x);mxX=Math.max(mxX,x);mnY=Math.min(mnY,y);mxY=Math.max(mxY,y)});
  const pad=60;
  svg.setAttribute('viewBox',`${mnX-pad} ${mnY-pad} ${mxX-mnX+pad*2} ${mxY-mnY+pad*2}`);

  let html=`<defs><filter id="shd"><feDropShadow dx="2" dy="5" stdDeviation="9" floodColor="rgba(0,0,0,0.09)"/></filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${c.lite}"/><stop offset="45%" stop-color="${c.body}"/><stop offset="100%" stop-color="${c.dark}"/></linearGradient></defs>`;

  // Draw each node
  function norm(x1,y1,x2,y2,hw){const dx=x2-x1,dy=y2-y1,l=Math.hypot(dx,dy)||1;return{nx:(-dy/l)*hw,ny:(dx/l)*hw}}

  // Shadow + Body combined per node
  nodes.forEach(n=>{
    const fill='url(#bg)',stk=c.edge,sw=1;
    if(n.type==='straight'||n.type==='t_piece'||n.type==='cross'){
      const{nx,ny}=norm(n.sx,n.sy,n.ex,n.ey,HW);
      // Shadow
      html+=`<polygon points="${n.sx+nx},${n.sy+ny} ${n.ex+nx},${n.ey+ny} ${n.ex-nx},${n.ey-ny} ${n.sx-nx},${n.sy-ny}" fill="${c.dark}" filter="url(#shd)"/>`;
      // Body
      html+=`<polygon points="${n.sx+nx},${n.sy+ny} ${n.ex+nx},${n.ey+ny} ${n.ex-nx},${n.ey-ny} ${n.sx-nx},${n.sy-ny}" fill="${fill}" stroke="${stk}" stroke-width="${sw}"/>`;
      html+=`<polygon points="${n.sx+nx},${n.sy+ny} ${n.ex+nx},${n.ey+ny} ${n.ex+nx*.4},${n.ey+ny*.4} ${n.sx+nx*.4},${n.sy+ny*.4}" fill="${c.lite}" opacity=".2"/>`;

      // T/Cross dalları
      if(n.type==='t_piece'||n.type==='cross'){
        const mx=(n.sx+n.ex)/2,my=(n.sy+n.ey)/2;
        n.branchPorts.forEach(bp=>{
          const{nx:bnx,ny:bny}=norm(mx,my,bp.x,bp.y,HW);
          html+=`<polygon points="${mx+bnx},${my+bny} ${mx-bnx},${my-bny} ${bp.x-bnx},${bp.y-bny} ${bp.x+bnx},${bp.y+bny}" fill="${c.dark}" filter="url(#shd)"/>`;
          html+=`<polygon points="${mx+bnx},${my+bny} ${mx-bnx},${my-bny} ${bp.x-bnx},${bp.y-bny} ${bp.x+bnx},${bp.y+bny}" fill="${fill}" stroke="${stk}" stroke-width="${sw}"/>`;
          html+=`<polygon points="${mx+bnx},${my+bny} ${mx+bnx*.4},${my+bny*.4} ${bp.x+bnx*.4},${bp.y+bny*.4} ${bp.x+bnx},${bp.y+bny}" fill="${c.lite}" opacity=".15"/>`;
          // Dal ucu kapak
          html+=`<circle cx="${bp.x}" cy="${bp.y}" r="${HW+.5}" fill="${c.body}" stroke="${stk}" stroke-width="1"/>`;
        });
        // Merkez
        html+=`<circle cx="${mx}" cy="${my}" r="${HW+1}" fill="${c.body}" stroke="${stk}" stroke-width="1"/>`;
      }
    } else if(n.type==='corner_l'||n.type==='corner_r'){
      const kx=n.sx+DX[n.dir]*CL,ky=n.sy+DY[n.dir]*CL;
      const{nx:n1x,ny:n1y}=norm(n.sx,n.sy,kx,ky,HW);
      const{nx:n2x,ny:n2y}=norm(kx,ky,n.ex,n.ey,HW);
      const path=`M${n.sx+n1x},${n.sy+n1y} L${kx+n1x},${ky+n1y} L${kx+n2x},${ky+n2y} L${n.ex+n2x},${n.ey+n2y} L${n.ex-n2x},${n.ey-n2y} L${kx-n2x},${ky-n2y} L${kx-n1x},${ky-n1y} L${n.sx-n1x},${n.sy-n1y} Z`;
      html+=`<path d="${path}" fill="${c.dark}" filter="url(#shd)"/>`;
      html+=`<path d="${path}" fill="${fill}" stroke="${stk}" stroke-width="${sw}" stroke-linejoin="miter"/>`;
    } else if(n.type==='curve_l'||n.type==='curve_r'){
      const cw=n.type==='curve_r',ep=getEP(n.dir,cw);
      const cx=n.sx+ep.cox,cy=n.sy+ep.coy;
      const sa=Math.atan2((n.sy-cy)/RY,(n.sx-cx)/RX);
      const ea=Math.atan2((n.ey-cy)/RY,(n.ex-cx)/RX);
      const o=eArc(cx,cy,sa,ea,cw,HW,1),nr=eArc(cx,cy,sa,ea,cw,HW,-1);
      const pts=[...o,...nr.reverse()].map(p=>p.join(',')).join(' ');
      html+=`<polygon points="${pts}" fill="${c.dark}" filter="url(#shd)"/>`;
      html+=`<polygon points="${pts}" fill="${fill}" stroke="${stk}" stroke-width="${sw}"/>`;
      const ho=eArc(cx,cy,sa,ea,cw,HW,1),hi=eArc(cx,cy,sa,ea,cw,HW*.3,1);
      html+=`<polygon points="${[...ho,...hi.reverse()].map(p=>p.join(',')).join(' ')}" fill="${c.lite}" opacity=".18"/>`;
    } else if(n.type==='cap'){
      const r=HW+4;
      html+=`<rect x="${n.sx-r}" y="${n.sy-r}" width="${r*2}" height="${r*2}" rx="4" fill="${c.body}" stroke="${stk}" stroke-width="1.5"/>`;
      html+=`<circle cx="${n.sx}" cy="${n.sy}" r="3" fill="${stk}" opacity=".5"/>`;
    }

    // Start/end caps for non-cap nodes
    if(n.type!=='cap'){
      html+=`<circle cx="${n.sx}" cy="${n.sy}" r="${HW+.5}" fill="${c.body}" stroke="${stk}" stroke-width="1"/>`;
      html+=`<circle cx="${n.ex}" cy="${n.ey}" r="${HW+.5}" fill="${c.body}" stroke="${stk}" stroke-width="1"/>`;
    }
  });

  // Open ports (drop targets)
  if(dragging){
    const isCap=PT.find(p=>p.id===dragging)?.isCap;
    ports.forEach(p=>{
      const active=dropPort&&dropPort.id===p.id;
      const pr=active?28:18;
      html+=`<circle cx="${p.x}" cy="${p.y}" r="${pr}" fill="${active?'rgba(139,115,85,.1)':'none'}" stroke="${active?'#8B7355':'rgba(139,115,85,.35)'}" stroke-width="${active?3:1.5}" ${active?'':'stroke-dasharray="6 4"'}/>`;
      if(active) html+=`<circle cx="${p.x}" cy="${p.y}" r="6" fill="#8B7355"/>`;
    });
  }

  svg.innerHTML=html;
}

// === UI ===
function flatPieces(){return nodes.map(n=>n.type)}

function updateUI(){
  renderSVG();
  const fp=flatPieces();
  document.getElementById('piecesSection').style.display=fp.length?'block':'none';
  document.getElementById('pCount').textContent=fp.length;
  document.getElementById('piecesList').innerHTML=nodes.map((n,i)=>{
    const t=PT.find(p=>p.id===n.type);
    return`<div class="pl-item"><span><span class="pl-idx">${i+1}</span>${t?t.name:n.type}</span><button class="pl-del" onclick="removeNode(${n.id})">×</button></div>`;
  }).join('');
  const counts={};fp.forEach(p=>{counts[p]=(counts[p]||0)+1});
  const total=fp.reduce((s,p)=>{const t=PT.find(pt=>pt.id===p);return s+(t?t.pr:0)},0);
  let sh='';Object.entries(counts).forEach(([k,v])=>{const t=PT.find(p=>p.id===k);sh+=`<div class="sum-row"><span>${t?t.name:k} ×${v}</span><span>₺${v*(t?t.pr:0)}</span></div>`});
  document.getElementById('sumDetails').innerHTML=sh;
  document.getElementById('sumPrice').textContent='₺'+total.toLocaleString('tr-TR');
  document.getElementById('orderBtn').disabled=!fp.length;
  document.getElementById('barInfo').textContent=Object.entries(counts).map(([k,v])=>{const t=PT.find(p=>p.id===k);return`${t?t.name.split(' ')[0]:'?'} ×${v}`}).join(' · ')||'Parça sürükleyin';
  document.getElementById('barPrice').textContent='₺'+total.toLocaleString('tr-TR');
  document.getElementById('badgeP').textContent=fp.length+' parça';
  document.getElementById('badgeC').textContent=COL[color].label;
  renderPalette();
}

// === CHECKOUT ===
function openCheckout(){
  const fp=flatPieces();if(!fp.length)return;
  const counts={};fp.forEach(p=>{counts[p]=(counts[p]||0)+1});
  const total=fp.reduce((s,p)=>{const t=PT.find(pt=>pt.id===p);return s+(t?t.pr:0)},0);
  let rows='';Object.entries(counts).forEach(([k,v])=>{const t=PT.find(p=>p.id===k);rows+=`<div class="m-row"><span>${t?t.name:k} ×${v}</span><span>₺${(v*(t?t.pr:0)).toLocaleString('tr-TR')}</span></div>`});
  rows+=`<div class="m-row"><span>Renk</span><span>${COL[color].label}</span></div>`;

  document.getElementById('modalContent').innerHTML=`
    <div class="sb-l" style="margin-bottom:8px">Sipariş</div>
    <h3>Tasarımınız Hazır</h3>
    <div class="m-summary">${rows}<div class="m-total"><span>Toplam</span><span>₺${total.toLocaleString('tr-TR')}</span></div></div>
    <div class="m-form">

      <input class="m-input" id="mEmail" placeholder="E-posta" type="email"/>
      <input class="m-input" id="mAddr" placeholder="Teslimat Adresi"/>
      <textarea class="m-input" id="mNote" placeholder="Not (opsiyonel)" rows="2" style="resize:none"></textarea>
    </div>
    <div class="m-btns">
      <button class="m-btn secondary" onclick="closeModal()">Geri Dön</button>

    </div>`;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('show')}

function submitOrder(){
  const name=document.getElementById('mName').value.trim();
  const phone=document.getElementById('mPhone').value.trim();
  if(!name||!phone){
    [document.getElementById('mName'),document.getElementById('mPhone')].forEach(el=>{
      if(!el.value.trim())el.style.borderColor='#c0392b';
      else el.style.borderColor='';
    });
    return;
  }
  document.getElementById('modalContent').innerHTML=`
    <div class="m-success">
      <div class="check">✓</div>
      <h4>Siparişiniz Alındı!</h4>
      <p><strong>${name}</strong>, teşekkür ederiz!<br>En kısa sürede <strong>${phone}</strong> numarasından sizinle iletişime geçeceğiz.</p>
    </div>
    <div class="m-btns" style="margin-top:16px">
      <button class="m-btn primary" onclick="closeModal()" style="flex:1">Tamam</button>
    </div>`;
}

function removeNode(id){
  // Remove this node and all nodes that depend on it
  const toRemove=new Set([id]);
  // Find chain: any node whose start matches this node's end or branch
  let changed=true;
  while(changed){
    changed=false;
    nodes.forEach(n=>{
      if(toRemove.has(n.id))return;
      // Check if this node starts where a removed node ends
      const parent=nodes.find(r=>toRemove.has(r.id)&&(
        (Math.abs(r.ex-n.sx)<1&&Math.abs(r.ey-n.sy)<1)||
        r.branchPorts.some(bp=>Math.abs(bp.x-n.sx)<1&&Math.abs(bp.y-n.sy)<1)
      ));
      if(parent){toRemove.add(n.id);changed=true}
    });
  }
  // Also unmark branch ports
  nodes.forEach(n=>{n.branchPorts.forEach(bp=>{
    const child=nodes.find(c=>toRemove.has(c.id)&&Math.abs(bp.x-c.sx)<1&&Math.abs(bp.y-c.sy)<1);
    if(child) bp.taken=false;
  })});
  nodes=nodes.filter(n=>!toRemove.has(n.id));
  updateUI();
}

function undo(){if(nodes.length){removeNode(nodes[nodes.length-1].id)}}
function clearAll(){nodes=[];nodeId=0;dropPort=null;updateUI()}
function setTab(t){tab=t;document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===(t==='build'?0:1)));document.getElementById('buildPanel').style.display=t==='build'?'block':'none';document.getElementById('presetsPanel').style.display=t==='presets'?'block':'none'}

// === PALETTE ===
const dpEl=document.getElementById('dragPieces');
function renderPalette(){
  dpEl.innerHTML='';
  const usedCounts={};nodes.forEach(n=>{usedCounts[n.type]=(usedCounts[n.type]||0)+1});
  PT.forEach(pt=>{
    const used=usedCounts[pt.id]||0;
    const remaining=pt.stock-used;
    const isOut=remaining<=0;
    const stockClass=isOut?'out':remaining<=3?'low':'';
    const el=document.createElement('div');el.className='drag-item';
    if(!isOut)el.draggable=true;
    if(isOut)el.style.opacity='.4';
    el.innerHTML=`<div class="di-icon" style="color:${isOut?'var(--stone)':'var(--accent)'}">${pt.icon}</div><div class="di-info"><div class="di-name">${pt.name}</div><div class="di-size">${pt.size} · ₺${pt.pr}</div><div class="stock-badge ${stockClass}"><span class="dot"></span>${isOut?'Stokta yok':remaining+' adet stokta'}</div></div>`;
    if(!isOut){
      el.addEventListener('dragstart',e=>{
        dragging=pt.id;
        const g=document.getElementById('ghost');g.style.display='flex';g.style.background='rgba(44,44,44,.9)';
        g.querySelector('.g-icon').innerHTML=pt.icon;g.querySelector('.g-label').textContent=pt.name.split(' ')[0];
        const img=new Image();img.src='data:image/gif;base64,R0lGODlhAQABAIAAAAUEBAAAACwAAAAAAQABAAACAkQBADs=';
        e.dataTransfer.setDragImage(img,0,0);renderSVG();
      });
      el.addEventListener('dragend',()=>{dragging=null;dropPort=null;document.getElementById('ghost').style.display='none';document.getElementById('dropHint').style.display='none';renderSVG()});
    }
    dpEl.appendChild(el);
  });
}

// === PRESETS ===
const prEl=document.getElementById('presetsList');
PRESETS.forEach(pr=>{
  const total=pr.p.reduce((s,k)=>{const t=PT.find(p=>p.id===k);return s+(t?t.pr:0)},0);
  const btn=document.createElement('button');btn.className='preset-btn'+(pr.popular?' pop':'');
  btn.innerHTML=(pr.popular?'<span class="pop-tag">POPÜLER</span>':'')+`<div class="pr-name">${pr.name}</div><div class="pr-info">${pr.p.length} parça · ₺${total}</div>`;
  btn.onclick=()=>{nodes=[];nodeId=0;let x=0,y=0,dir=0;pr.p.forEach(type=>{const n=addNode(type,x,y,dir);x=n.ex;y=n.ey;dir=n.edir});setTab('build');updateUI()};
  prEl.appendChild(btn);
});

// === COLORS ===
const crEl=document.getElementById('colorRow');
Object.entries(COL).forEach(([k,v])=>{
  const el=document.createElement('div');
  el.className='cs'+(k==='black'?' active':'')+(v.inStock?'':' out-of-stock');
  el.style.background=v.body;el.title=v.label+(v.inStock?'':' (Stokta yok)');
  if(k==='white')el.style.borderColor='#ddd';
  const tip=document.createElement('span');tip.className='cs-tip';tip.textContent=v.inStock?v.label:v.label+' ✕';el.appendChild(tip);
  el.onclick=()=>{
    if(!v.inStock)return;
    color=k;document.querySelectorAll('.cs').forEach(s=>s.classList.remove('active'));el.classList.add('active');updateUI();
  };
  crEl.appendChild(el);
});

// === DROP LOGIC ===
function screenToSVG(cx,cy){
  const svg=document.getElementById('svg'),rect=svg.getBoundingClientRect(),vb=svg.viewBox.baseVal;
  if(!vb||vb.width===0||rect.width===0)return null;
  return{x:(cx-rect.left)*vb.width/rect.width+vb.x,y:(cy-rect.top)*vb.height/rect.height+vb.y};
}

document.addEventListener('drag',e=>{
  if(!dragging||!e.clientX)return;
  const g=document.getElementById('ghost');g.style.left=(e.clientX-28)+'px';g.style.top=(e.clientY-28)+'px';
  const ports=getOpenPorts();
  const m=screenToSVG(e.clientX,e.clientY);
  dropPort=null;
  if(m&&ports.length){
    let best=Infinity,bp=null;
    ports.forEach(p=>{const d=Math.hypot(m.x-p.x,m.y-p.y);if(d<best){best=d;bp=p}});
    if(best<120){dropPort=bp;g.style.background='rgba(139,115,85,.95)';g.style.transform='scale(1.15)'}
    else{g.style.background='rgba(44,44,44,.9)';g.style.transform='scale(1)'}
  } else if(!nodes.length){dropPort={id:'origin',x:0,y:0,dir:0};g.style.background='rgba(139,115,85,.95)';g.style.transform='scale(1.15)'}
  const hint=document.getElementById('dropHint');
  if(dropPort){hint.style.display='block';hint.textContent=dropPort.label==='Dal'?'↳ Dala ekle':dropPort.label==='Baş'?'← Başa ekle':'→ Ekle'}
  else{hint.style.display=nodes.length?'block':'none';if(nodes.length)hint.textContent='Bağlantı noktasına sürükleyin'}
  renderSVG();
});

const canvas=document.getElementById('canvas');
canvas.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='copy'});
canvas.addEventListener('drop',e=>{
  e.preventDefault();
  if(!dragging)return;
  let port=dropPort;
  if(!port){
    if(!nodes.length) port={id:'origin',x:0,y:0,dir:0};
    else{const ports=getOpenPorts();if(ports.length)port=ports[0]}
  }
  if(!port){dragging=null;dropPort=null;return}

  // Başa ekleme durumu
  if(port.id==='start'&&dragging!=='cap'){
    // Yeni parçayı ters yönde ekle, sonra tüm zinciri kaydır
    const reverseDir=(port.dir+2)%4; // port.dir zaten ters yön
    const n=addNode(dragging,port.x,port.y,port.dir);
    // Aslında bu noktadan port.dir yönüne gidecek, start noktası port'ta
  } else {
    // Branch port mu?
    const bpMatch=nodes.find(nd=>nd.branchPorts.some(bp=>bp.id===port.id));
    if(bpMatch){
      const bp=bpMatch.branchPorts.find(bp=>bp.id===port.id);
      bp.taken=true;
    }
    addNode(dragging,port.x,port.y,port.dir);
  }

  dragging=null;dropPort=null;
  document.getElementById('ghost').style.display='none';
  document.getElementById('dropHint').style.display='none';
  updateUI();
});

updateUI();
