<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curveo — Kendin Tasarla</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--cream:#FAF7F2;--warm-white:#F5F0E8;--sand:#E8DFD0;--stone:#C4B8A5;--charcoal:#2C2C2C;--dark:#1A1A1A;--accent:#8B7355;--accent-light:#A6916F;--soft-gray:#6B6560}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--charcoal);overflow:hidden;-webkit-font-smoothing:antialiased;height:100vh}

  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:14px 36px;background:rgba(250,247,242,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(200,190,175,.3);box-shadow:0 2px 40px rgba(0,0,0,.04)}
  .logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;letter-spacing:6px;text-transform:uppercase;color:var(--dark);text-decoration:none}
  .logo span{font-weight:300;color:var(--accent)}
  .nav-back{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--accent);font-size:12px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase}

  .app{display:flex;height:100vh;padding-top:56px}

  /* SIDEBAR */
  .sidebar{width:300px;min-width:300px;background:var(--warm-white);border-right:1px solid var(--sand);display:flex;flex-direction:column;overflow-y:auto}
  .sidebar::-webkit-scrollbar{width:4px}
  .sidebar::-webkit-scrollbar-thumb{background:var(--sand);border-radius:4px}
  .sb-h{padding:24px 20px 16px;border-bottom:1px solid rgba(200,190,175,.3)}
  .sb-h h2{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:var(--dark);margin-bottom:4px}
  .sb-h p{font-size:12px;color:var(--soft-gray);font-weight:300;line-height:1.5}
  .sb-s{padding:16px 20px;border-bottom:1px solid rgba(200,190,175,.15)}
  .sb-l{font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
  .sb-l button{background:none;border:none;color:var(--stone);font-size:8px;cursor:pointer;font-weight:700;font-family:inherit;letter-spacing:1.5px}
  .sb-l button:hover{color:#c0392b}

  /* TABS */
  .tabs{display:flex;gap:0;margin-bottom:14px;border:1px solid var(--sand);border-radius:8px;overflow:hidden}
  .tab{flex:1;padding:8px;text-align:center;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;background:var(--cream);color:var(--soft-gray);transition:all .2s;border:none;font-family:inherit}
  .tab.active{background:var(--charcoal);color:var(--cream)}

  /* PIECE DRAG ITEMS */
  .drag-pieces{display:flex;flex-direction:column;gap:6px}
  .drag-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--sand);border-radius:12px;background:var(--cream);cursor:grab;transition:all .2s;user-select:none}
  .drag-item:hover{border-color:var(--accent);transform:translateX(3px);box-shadow:0 4px 16px rgba(139,115,85,.1)}
  .drag-item:active{cursor:grabbing;transform:scale(.97)}
  .drag-item .di-icon{width:48px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .drag-item .di-info{flex:1}
  .drag-item .di-name{font-size:12px;font-weight:500;color:var(--charcoal)}
  .drag-item .di-size{font-size:10px;color:var(--stone);margin-top:1px}

  /* PRESETS */
  .presets{display:flex;flex-direction:column;gap:6px}
  .preset-btn{padding:14px;border-radius:10px;border:1px solid var(--sand);background:var(--cream);cursor:pointer;text-align:left;font-family:inherit;transition:all .15s;position:relative}
  .preset-btn:hover{transform:translateX(3px);border-color:var(--accent)}
  .preset-btn.pop{border:2px solid var(--accent)}
  .preset-btn .pop-tag{position:absolute;top:-8px;right:10px;background:var(--accent);color:white;padding:2px 8px;border-radius:100px;font-size:7px;font-weight:700;letter-spacing:1px}
  .preset-btn .pr-name{font-size:13px;font-weight:500}
  .preset-btn .pr-info{font-size:10px;color:var(--stone);margin-top:2px}

  /* PIECES LIST */
  .pieces-list{display:flex;flex-direction:column;gap:1px;max-height:150px;overflow-y:auto;margin-bottom:10px}
  .pl-item{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:6px;font-size:11px;transition:background .15s}
  .pl-item:hover{background:rgba(139,115,85,.06)}
  .pl-item .pl-idx{color:var(--stone);font-size:9px;margin-right:6px;min-width:14px}
  .pl-item .pl-del{background:none;border:none;color:var(--stone);cursor:pointer;font-size:16px;font-family:inherit;line-height:1;padding:0 2px}
  .pl-item .pl-del:hover{color:#c0392b}

  /* COLORS */
  .color-row{display:flex;gap:7px;flex-wrap:wrap}
  .cs{width:32px;height:32px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:all .25s;position:relative}
  .cs:hover{transform:scale(1.15)}
  .cs.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,115,85,.18)}

  /* SUMMARY */
  .sb-sum{margin-top:auto;padding:16px 20px;border-top:1px solid var(--sand);background:var(--warm-white)}
  .sum-row{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;color:var(--soft-gray)}
  .sum-total{display:flex;justify-content:space-between;padding:8px 0 0;margin-top:8px;border-top:1px solid var(--sand);font-weight:600}
  .sum-total .sum-price{font-family:'Cormorant Garamond',serif;font-size:24px}
  .ob{display:block;width:100%;padding:13px;border-radius:100px;border:none;background:var(--charcoal);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .3s;margin-top:12px}
  .ob:hover{background:var(--accent);transform:translateY(-1px);box-shadow:0 8px 24px rgba(139,115,85,.25)}
  .ob:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
  .undo-btn{width:100%;padding:8px;border-radius:8px;border:1px solid var(--sand);background:transparent;font-size:10px;color:var(--soft-gray);cursor:pointer;font-family:inherit;margin-bottom:10px;transition:all .2s}
  .undo-btn:hover{border-color:var(--accent);color:var(--charcoal)}

  /* CANVAS */
  .canvas-area{flex:1;display:flex;flex-direction:column;min-width:0}
  .canvas-main{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;background:linear-gradient(180deg,#FDFCFA,#F5F0E8);transition:background .3s;overflow:hidden}
  .canvas-main.dragging-over{background:linear-gradient(180deg,#FDFCFA,#EDE8DD)}
  .canvas-main .dot-bg{position:absolute;inset:0;opacity:.015;background-image:radial-gradient(circle,#8B7355 .5px,transparent .5px);background-size:22px 22px;pointer-events:none}
  .canvas-bar{padding:10px 20px;border-top:1px solid var(--sand);background:var(--warm-white);display:flex;justify-content:space-between;align-items:center}
  .canvas-bar .cb-info{font-size:11px;color:var(--soft-gray)}
  .canvas-bar .cb-price{font-family:'Cormorant Garamond',serif;font-size:24px}

  .empty-hint{display:flex;flex-direction:column;align-items:center;gap:14px;opacity:.4}
  .empty-hint p{color:var(--stone);font-size:14px}

  /* DRAG TARGET HINT */
  .drop-hint-bar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(139,115,85,.9);color:white;padding:7px 20px;border-radius:100px;font-size:11px;font-weight:600;pointer-events:none;white-space:nowrap;z-index:50}
  .badge-bar{position:absolute;bottom:14px;left:14px;background:rgba(26,26,26,.72);backdrop-filter:blur(8px);color:white;padding:5px 14px;border-radius:100px;font-size:10px;font-weight:500;display:flex;gap:10px}
  .badge-bar .sep{opacity:.35}

  /* GHOST */
  .ghost{position:fixed;width:56px;height:56px;border-radius:14px;color:white;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.2);transition:background .15s,transform .15s;flex-direction:column;gap:2px}
  .ghost .g-icon{font-size:22px}
  .ghost .g-label{font-size:7px;font-weight:700;opacity:.7}

  @media(max-width:900px){.app{flex-direction:column}.sidebar{width:100%;min-width:auto;max-height:40vh}.canvas-area{min-height:60vh}nav{padding:10px 16px}}
  @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .sb-s{animation:fu .4s ease both}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Curve<span>o</span></a>
  <a href="index.html" class="nav-back"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 2L4 8l6 6"/></svg> Siteye Dön</a>
</nav>
<div class="app">
  <div class="sidebar">
    <div class="sb-h">
      <h2>Kendin Tasarla</h2>
      <p>Parçaları sürükleyip kanvasa bırakın. Otomatik birbirine yapışır.</p>
    </div>
    <div class="sb-s">
      <div class="tabs">
        <button class="tab active" onclick="setTab('build')">Oluştur</button>
        <button class="tab" onclick="setTab('presets')">Şablonlar</button>
      </div>
      <div id="buildPanel">
        <div class="sb-l">Parça Sürükle</div>
        <div class="drag-pieces" id="dragPieces"></div>
      </div>
      <div id="presetsPanel" style="display:none">
        <div class="sb-l">Hazır Şablonlar</div>
        <div class="presets" id="presetsList"></div>
      </div>
    </div>
    <div class="sb-s" id="piecesSection" style="display:none">
      <div class="sb-l"><span>Parçalar (<span id="pCount">0</span>)</span><button onclick="clearAll()">TEMİZLE</button></div>
      <div class="pieces-list" id="piecesList"></div>
      <button class="undo-btn" onclick="undo()">← Geri Al</button>
    </div>
    <div class="sb-s">
      <div class="sb-l">Renk</div>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="sb-sum">
      <div id="sumDetails"></div>
      <div class="sum-total"><span>Toplam</span><span class="sum-price" id="sumPrice">₺0</span></div>
      <button class="ob" id="orderBtn" disabled onclick="alert('Siparişiniz alındı! En kısa sürede iletişime geçeceğiz.')">Sipariş Ver</button>
    </div>
  </div>

  <div class="canvas-area">
    <div class="canvas-main" id="canvas">
      <div class="dot-bg"></div>
      <svg id="shelfSvg" style="width:100%;height:100%;max-height:540px" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="empty-hint" id="emptyHint">
        <svg width="110" height="65" viewBox="0 0 110 65" fill="none"><path d="M12 5L50 5Q68 5 68 23L68 42Q68 60 50 60L12 60Q5 55 5 42L5 23Q5 8 12 5" stroke="#B0A898" stroke-width="3" fill="none" stroke-dasharray="5 4"/></svg>
        <p>Parçaları sürükleyip buraya bırakın</p>
      </div>
      <div class="badge-bar" id="badge" style="display:none"><span id="badgePieces">0 parça</span><span class="sep">|</span><span id="badgeColor">Siyah</span></div>
      <div class="drop-hint-bar" id="dropHint" style="display:none"></div>
    </div>
    <div class="canvas-bar">
      <div class="cb-info" id="barInfo">Parça sürükleyin</div>
      <div class="cb-price" id="barPrice">₺0</div>
    </div>
  </div>
</div>
<div class="ghost" id="ghost" style="display:none"><span class="g-icon"></span><span class="g-label"></span></div>

<script>
/* STL Gerçek Ölçüler (mm):
   Straight: 225.9×20×100 | Curve CW: 218×228×100 | Curve CCW: 228×218×100
   Kavis yarıçapı ≈ 218mm (RX) × 228mm (RY)
*/
const RX=172, RY=192, HW=10, SL=226; // SVG coordinate system (önceki ile aynı)

const PIECE_TYPES=[
  {id:'curve_l',name:'Sol Kavis',icon:'↰',size:'228×218mm',price:200},
  {id:'curve_r',name:'Sağ Kavis',icon:'↱',size:'218×228mm',price:200},
  {id:'straight',name:'Düz Parça',icon:'━',size:'226×20mm',price:120}
];

const COLORS={
  black:{body:'#2C2C2C',lite:'#3D3D3D',dark:'#1A1A1A',edge:'#111',label:'Siyah'},
  white:{body:'#E8E4DC',lite:'#F4F1EA',dark:'#D2CCC2',edge:'#C0BAB0',label:'Beyaz'},
  walnut:{body:'#8B7355',lite:'#A6916F',dark:'#6B5540',edge:'#5D4E37',label:'Ceviz'},
  oak:{body:'#C4A882',lite:'#D4BC9A',dark:'#A8916A',edge:'#8B7A60',label:'Meşe'},
  mint:{body:'#9DD4C5',lite:'#BDE8DC',dark:'#7CBDAD',edge:'#5EA898',label:'Mint'}
};

const PRESETS=[
  {name:'Tekli U',p:['curve_l','curve_l']},
  {name:'İkili Set',p:['curve_l','curve_l','straight','curve_r','curve_r','straight','curve_l','curve_l'],popular:true},
  {name:'S Dalga',p:['curve_l','curve_l','curve_r','curve_r']},
  {name:'Üçlü Set',p:['curve_l','curve_l','straight','curve_r','curve_r','straight','curve_l','curve_l','straight','curve_r','curve_r']}
];

let pieces=[], color='black', tab='build', dragging=null, dropTarget=null, hovered=null;
const DX=[1,0,-1,0], DY=[0,1,0,-1];

function getEP(dir,cw){
  if(cw)return [{cox:0,coy:RY,eox:RX,eoy:RY},{cox:-RX,coy:0,eox:-RX,eoy:RY},{cox:0,coy:-RY,eox:-RX,eoy:-RY},{cox:RX,coy:0,eox:RX,eoy:-RY}][dir];
  return [{cox:0,coy:-RY,eox:RX,eoy:-RY},{cox:RX,coy:0,eox:RX,eoy:RY},{cox:0,coy:RY,eox:-RX,eoy:RY},{cox:-RX,coy:0,eox:-RX,eoy:-RY}][dir];
}

function build(ps){
  let x=0,y=0,dir=0;const segs=[];
  for(const p of ps){
    const sx=x,sy=y;
    if(p==='straight'){x+=DX[dir]*SL;y+=DY[dir]*SL;segs.push({t:'s',x1:sx,y1:sy,x2:x,y2:y})}
    else{const cw=p==='curve_r',ep=getEP(dir,cw),cx=sx+ep.cox,cy=sy+ep.coy;x=sx+ep.eox;y=sy+ep.eoy;
      segs.push({t:'e',cx,cy,sa:Math.atan2((sy-cy)/RY,(sx-cx)/RX),ea:Math.atan2((y-cy)/RY,(x-cx)/RX),cw,sx,sy,ex:x,ey:y});
      dir=cw?(dir+1)%4:(dir+3)%4}
  }
  const aX=[],aY=[];
  for(const s of segs){
    if(s.t==='s'){const dx=s.x2-s.x1,dy=s.y2-s.y1,l=Math.hypot(dx,dy)||1,nx=(-dy/l)*(HW+5),ny=(dx/l)*(HW+5);
      aX.push(s.x1+nx,s.x1-nx,s.x2+nx,s.x2-nx);aY.push(s.y1+ny,s.y1-ny,s.y2+ny,s.y2-ny)}
    else{let sw=s.ea-s.sa;if(s.cw&&sw<0)sw+=Math.PI*2;if(!s.cw&&sw>0)sw-=Math.PI*2;
      for(let i=0;i<=16;i++){const a=s.sa+sw*(i/16),co=Math.cos(a),si=Math.sin(a);
        aX.push(s.cx+(RX+HW+5)*co,s.cx+(RX-HW-5)*co);aY.push(s.cy+(RY+HW+5)*si,s.cy+(RY-HW-5)*si)}}
  }
  if(!aX.length)return{segs:[],mnX:0,mxX:0,mnY:-200,mxY:200,sx:0,sy:0,ex:0,ey:0};
  return{segs,mnX:Math.min(...aX),mxX:Math.max(...aX),mnY:Math.min(...aY),mxY:Math.max(...aY),sx:segs[0]?.x1??0,sy:segs[0]?.y1??0,ex:x,ey:y};
}

function eArc(cx,cy,sa,ea,cw,hw,side,N=36){
  let sw=ea-sa;if(cw&&sw<0)sw+=Math.PI*2;if(!cw&&sw>0)sw-=Math.PI*2;
  const pts=[];for(let i=0;i<=N;i++){const a=sa+sw*(i/N),co=Math.cos(a),si=Math.sin(a);
    const nl=Math.sqrt((co/RX)**2+(si/RY)**2),nx=(co/RX)/nl,ny=(si/RY)/nl;
    pts.push([cx+RX*co+nx*side*hw,cy+RY*si+ny*side*hw])}return pts;
}

function renderSVG(){
  const svg=document.getElementById('shelfSvg');
  const c=COLORS[color],d=build(pieces);
  document.getElementById('emptyHint').style.display=pieces.length?'none':'flex';
  document.getElementById('badge').style.display=pieces.length?'flex':'none';
  if(!pieces.length&&!dragging){svg.innerHTML='';return}

  const pad=40,vx=pieces.length?(d.mnX-pad):-300,vy=pieces.length?(d.mnY-pad):-250;
  const vw=pieces.length?(d.mxX-d.mnX+pad*2):600,vh=pieces.length?(d.mxY-d.mnY+pad*2):500;
  svg.setAttribute('viewBox',`${vx} ${vy} ${vw} ${vh}`);

  let html=`<defs><filter id="shd"><feDropShadow dx="2" dy="5" stdDeviation="9" floodColor="rgba(0,0,0,0.09)"/></filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${c.lite}"/><stop offset="45%" stop-color="${c.body}"/><stop offset="100%" stop-color="${c.dark}"/></linearGradient></defs>`;

  // Shadow layer
  html+='<g filter="url(#shd)">';
  d.segs.forEach((s,i)=>{
    if(s.t==='s'){const dx=s.x2-s.x1,dy=s.y2-s.y1,l=Math.hypot(dx,dy)||1,nx=(-dy/l)*HW,ny=(dx/l)*HW;
      html+=`<polygon points="${s.x1+nx},${s.y1+ny} ${s.x2+nx},${s.y2+ny} ${s.x2-nx},${s.y2-ny} ${s.x1-nx},${s.y1-ny}" fill="${c.dark}"/>`}
    else{const o=eArc(s.cx,s.cy,s.sa,s.ea,s.cw,HW,1),n=eArc(s.cx,s.cy,s.sa,s.ea,s.cw,HW,-1);
      html+=`<polygon points="${[...o,...n.reverse()].map(p=>p.join(',')).join(' ')}" fill="${c.dark}"/>`}
  });
  html+='</g>';

  // Body layer
  d.segs.forEach((s,i)=>{
    const hi=hovered===i,fill=hi?c.lite:'url(#bg)',stk=hi?'#8B7355':c.edge,sw=hi?2.5:1;
    if(s.t==='s'){const dx=s.x2-s.x1,dy=s.y2-s.y1,l=Math.hypot(dx,dy)||1,nx=(-dy/l)*HW,ny=(dx/l)*HW;
      const mp=`${s.x1+nx},${s.y1+ny} ${s.x2+nx},${s.y2+ny} ${s.x2-nx},${s.y2-ny} ${s.x1-nx},${s.y1-ny}`;
      const tp=`${s.x1+nx},${s.y1+ny} ${s.x2+nx},${s.y2+ny} ${s.x2+nx*.5},${s.y2+ny*.5} ${s.x1+nx*.5},${s.y1+ny*.5}`;
      html+=`<polygon points="${mp}" fill="${fill}" stroke="${stk}" stroke-width="${sw}" stroke-linejoin="round"/><polygon points="${tp}" fill="${c.lite}" opacity=".2"/>`}
    else{const o=eArc(s.cx,s.cy,s.sa,s.ea,s.cw,HW,1),n=eArc(s.cx,s.cy,s.sa,s.ea,s.cw,HW,-1);
      html+=`<polygon points="${[...o,...n.reverse()].map(p=>p.join(',')).join(' ')}" fill="${fill}" stroke="${stk}" stroke-width="${sw}" stroke-linejoin="round"/>`;
      const ho=eArc(s.cx,s.cy,s.sa,s.ea,s.cw,HW,1),hi2=eArc(s.cx,s.cy,s.sa,s.ea,s.cw,HW*.3,1);
      html+=`<polygon points="${[...ho,...hi2.reverse()].map(p=>p.join(',')).join(' ')}" fill="${c.lite}" opacity=".18"/>`}
  });

  // End caps
  if(d.segs.length){
    html+=`<circle cx="${d.sx}" cy="${d.sy}" r="${HW+.5}" fill="${c.body}" stroke="${c.edge}" stroke-width="1"/>`;
    html+=`<circle cx="${d.ex}" cy="${d.ey}" r="${HW+.5}" fill="${c.body}" stroke="${c.edge}" stroke-width="1"/>`;
  }

  // Snap zones when dragging
  if(dragging&&d.segs.length){
    const isEnd=dropTarget==='end',isStart=dropTarget==='start';
    const pr=22,po=.5;
    html+=`<circle cx="${d.ex}" cy="${d.ey}" r="${isEnd?pr*1.8:pr}" fill="none" stroke="${isEnd?'#8B7355':'rgba(139,115,85,.4)'}" stroke-width="${isEnd?3:2}" ${isEnd?'':'stroke-dasharray="8 5"'} opacity="${isEnd?1:po}"/>`;
    html+=`<circle cx="${d.ex}" cy="${d.ey}" r="8" fill="${isEnd?'#8B7355':'rgba(139,115,85,.5)'}"/>`;
    if(isEnd)html+=`<circle cx="${d.ex}" cy="${d.ey}" r="${pr*2.5}" fill="rgba(139,115,85,.06)"/>`;
    html+=`<circle cx="${d.sx}" cy="${d.sy}" r="${isStart?pr*1.8:pr}" fill="none" stroke="${isStart?'#8B7355':'rgba(139,115,85,.4)'}" stroke-width="${isStart?3:2}" ${isStart?'':'stroke-dasharray="8 5"'} opacity="${isStart?1:po}"/>`;
    html+=`<circle cx="${d.sx}" cy="${d.sy}" r="8" fill="${isStart?'#8B7355':'rgba(139,115,85,.5)'}"/>`;
    if(isStart)html+=`<circle cx="${d.sx}" cy="${d.sy}" r="${pr*2.5}" fill="rgba(139,115,85,.06)"/>`;
  }

  svg.innerHTML=html;
}

function updateUI(){
  renderSVG();
  // Pieces list
  const sec=document.getElementById('piecesSection');
  sec.style.display=pieces.length?'block':'none';
  document.getElementById('pCount').textContent=pieces.length;
  const list=document.getElementById('piecesList');
  list.innerHTML=pieces.map((p,i)=>{
    const t=PIECE_TYPES.find(pt=>pt.id===p);
    return `<div class="pl-item" onmouseenter="setHovered(${i})" onmouseleave="setHovered(null)">
      <span><span class="pl-idx">${i+1}</span>${t?t.name:p}</span>
      <button class="pl-del" onclick="removePiece(${i})">×</button></div>`
  }).join('');

  // Summary
  const counts={};pieces.forEach(p=>{counts[p]=(counts[p]||0)+1});
  const capPrice=pieces.length?70:0;
  const total=pieces.reduce((s,p)=>{const t=PIECE_TYPES.find(pt=>pt.id===p);return s+(t?t.price:0)},0)+capPrice;
  let sumHtml='';
  Object.entries(counts).forEach(([k,v])=>{const t=PIECE_TYPES.find(pt=>pt.id===k);
    sumHtml+=`<div class="sum-row"><span>${t?t.name:k} ×${v}</span><span>₺${v*(t?t.price:0)}</span></div>`});
  if(pieces.length)sumHtml+=`<div class="sum-row"><span>Kapak Seti</span><span>₺70</span></div>`;
  document.getElementById('sumDetails').innerHTML=sumHtml;
  document.getElementById('sumPrice').textContent='₺'+total.toLocaleString('tr-TR');
  document.getElementById('orderBtn').disabled=!pieces.length;

  // Bar
  const barParts=Object.entries(counts).map(([k,v])=>{const t=PIECE_TYPES.find(pt=>pt.id===k);return `${t?t.name.split(' ')[0]:'?'} ×${v}`});
  document.getElementById('barInfo').textContent=barParts.join(' · ')||'Parça sürükleyin';
  document.getElementById('barPrice').textContent='₺'+total.toLocaleString('tr-TR');
  document.getElementById('badgePieces').textContent=pieces.length+' parça';
  document.getElementById('badgeColor').textContent=COLORS[color].label;
}

// === TABS ===
function setTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===(t==='build'?0:1)));
  document.getElementById('buildPanel').style.display=t==='build'?'block':'none';
  document.getElementById('presetsPanel').style.display=t==='presets'?'block':'none';
}

// === DRAG PIECES ===
const dpEl=document.getElementById('dragPieces');
PIECE_TYPES.forEach(pt=>{
  const el=document.createElement('div');el.className='drag-item';el.draggable=true;
  el.innerHTML=`<div class="di-icon" style="font-size:24px;color:var(--accent)">${pt.icon}</div><div class="di-info"><div class="di-name">${pt.name}</div><div class="di-size">${pt.size} · ₺${pt.price}</div></div>`;
  el.addEventListener('dragstart',e=>{
    dragging=pt.id;
    document.getElementById('ghost').style.display='flex';
    document.getElementById('ghost').style.background='rgba(44,44,44,.9)';
    document.getElementById('ghost').querySelector('.g-icon').textContent=pt.icon;
    document.getElementById('ghost').querySelector('.g-label').textContent=pt.name.split(' ')[0];
    const img=new Image();img.src='data:image/gif;base64,R0lGODlhAQABAIAAAAUEBAAAACwAAAAAAQABAAACAkQBADs=';
    e.dataTransfer.setDragImage(img,0,0);
    document.getElementById('canvas').classList.add('dragging-over');
    renderSVG();
  });
  el.addEventListener('dragend',()=>{
    dragging=null;dropTarget=null;
    document.getElementById('ghost').style.display='none';
    document.getElementById('canvas').classList.remove('dragging-over');
    document.getElementById('dropHint').style.display='none';
    renderSVG();
  });
  dpEl.appendChild(el);
});

// === PRESETS ===
const prEl=document.getElementById('presetsList');
PRESETS.forEach(pr=>{
  const total=pr.p.reduce((s,k)=>{const t=PIECE_TYPES.find(pt=>pt.id===k);return s+(t?t.price:0)},0)+70;
  const btn=document.createElement('button');
  btn.className='preset-btn'+(pr.popular?' pop':'');
  btn.innerHTML=(pr.popular?'<span class="pop-tag">POPÜLER</span>':'')+
    `<div class="pr-name">${pr.name}</div><div class="pr-info">${pr.p.length} parça · ₺${total}</div>`;
  btn.onclick=()=>{pieces=[...pr.p];setTab('build');updateUI()};
  prEl.appendChild(btn);
});

// === COLORS ===
const crEl=document.getElementById('colorRow');
Object.entries(COLORS).forEach(([k,v])=>{
  const el=document.createElement('div');el.className='cs'+(k==='black'?' active':'');
  el.style.background=v.body;el.title=v.label;
  if(k==='white')el.style.border='2.5px solid #ddd';
  el.onclick=()=>{color=k;document.querySelectorAll('.cs').forEach(s=>s.classList.remove('active'));el.classList.add('active');updateUI()};
  crEl.appendChild(el);
});

// === GHOST + DROP LOGIC ===
function screenToSVG(clientX, clientY){
  const svg=document.getElementById('shelfSvg');
  const rect=svg.getBoundingClientRect();
  const vb=svg.viewBox.baseVal;
  if(!vb||vb.width===0||rect.width===0) return null;
  const scaleX=vb.width/rect.width, scaleY=vb.height/rect.height;
  return { x:(clientX-rect.left)*scaleX+vb.x, y:(clientY-rect.top)*scaleY+vb.y };
}

document.addEventListener('drag',e=>{
  if(!dragging||e.clientX===0)return;
  const g=document.getElementById('ghost');
  g.style.left=(e.clientX-28)+'px';g.style.top=(e.clientY-28)+'px';

  // Determine drop target
  if(pieces.length){
    const d=build(pieces);
    const m=screenToSVG(e.clientX,e.clientY);
    if(m){
      const dEnd=Math.hypot(m.x-d.ex,m.y-d.ey), dStart=Math.hypot(m.x-d.sx,m.y-d.sy);
      // Daha yakın olan uç nokta otomatik seçilir
      if(dEnd<=dStart){dropTarget='end';g.style.background='rgba(139,115,85,.95)';g.style.transform='scale(1.15)'}
      else{dropTarget='start';g.style.background='rgba(139,115,85,.95)';g.style.transform='scale(1.15)'}
    } else {
      // SVG henüz viewBox yoksa varsayılan olarak sona ekle
      dropTarget='end';g.style.background='rgba(139,115,85,.95)';g.style.transform='scale(1.15)';
    }
  } else {dropTarget='end'}

  const hint=document.getElementById('dropHint');
  if(dropTarget){hint.style.display='block';hint.textContent=dropTarget==='end'?'→ Sona ekle':'← Başa ekle'}
  else{hint.style.display='none'}
  renderSVG();
});

const canvas=document.getElementById('canvas');
canvas.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='copy'});
canvas.addEventListener('drop',e=>{
  e.preventDefault();
  if(!dragging)return;
  // Kanvas üzerine bırakıldığında her zaman ekle
  if(dropTarget==='start') pieces.unshift(dragging);
  else pieces.push(dragging); // 'end' veya null → sona ekle
  dragging=null;dropTarget=null;
  document.getElementById('ghost').style.display='none';
  document.getElementById('canvas').classList.remove('dragging-over');
  document.getElementById('dropHint').style.display='none';
  updateUI();
});

// === ACTIONS ===
function removePiece(i){pieces.splice(i,1);hovered=null;updateUI()}
function undo(){if(pieces.length){pieces.pop();updateUI()}}
function clearAll(){pieces=[];hovered=null;updateUI()}
function setHovered(i){hovered=i;renderSVG()}

updateUI();
</script>
</body>
</html>
